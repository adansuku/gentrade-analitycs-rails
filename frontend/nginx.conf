server {
  listen 80;
  server_name _;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  # Allow same-origin iframes (LandingPage component embeds /landing.html)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
  # OAuth popup flows need the opener to retain a handle to cross-origin popups
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  # NOTE: HSTS should be set at the TLS terminator (Nginx prod / reverse proxy).
  # Body size limit (uploads cap at 25MB server-side)
  client_max_body_size 25M;

  location /api/ {
    proxy_pass http://backend:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://backend:3001/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Archived A/B variant — /home-a serves the original landing (pre-redesign)
  location = /home-a {
    root /usr/share/nginx/html;
    try_files /home-a.html =404;
  }

  # Archived A/B variant — /home-b serves the home-b.html variant
  location = /home-b {
    root /usr/share/nginx/html;
    try_files /home-b.html =404;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
