services:
  postgres:
    image: postgres:15-alpine
    container_name: gentrade-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gentrade_rails_development
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gentrade-network

  redis:
    image: redis:7-alpine
    container_name: gentrade-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gentrade-network

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: gentrade-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gentrade-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: gentrade-backend
    command: >
      bash -c "
        bundle check --gemfile=/app/Gemfile > /dev/null 2>&1 || bundle install &&
        bundle exec rails db:migrate &&
        bundle exec rails tailwindcss:watch &
        bundle exec rails s -b 0.0.0.0 -p 3002
      "
    volumes:
      - ./backend:/app
      - backend_gems:/usr/local/bundle
    ports:
      - "3002:3002"
    # Carga credenciales (OPENAI_API_KEY, GOOGLE_CLIENT_ID/SECRET/REDIRECT_URI, etc.)
    # desde backend/.env. Las variables de `environment:` de abajo tienen prioridad
    # y fijan la conexión a los servicios del compose.
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gentrade_rails_development
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=materials
      - RAILS_ENV=development
      - RAILS_LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - gentrade-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_gems:

networks:
  gentrade-network:
    driver: bridge
